      if (!wc.tasks.length) { showToast('タスクを1つ以上入力してください'); return; }
      const i = state.templates.findIndex(t=>t.id===wc.id);
      if (i>=0) state.templates[i] = wc; else state.templates.push(wc);
      persistTemplates(); closeTemplate(); renderSettings(); showToast('テンプレートを保存しました');
    });
  }

  $('#templateModal').classList.add('open');
  render();
}
function closeTemplate() { $('#templateModal').classList.remove('open'); }
$('#templateModal').addEventListener('click', e => { if (e.target.id === 'templateModal') closeTemplate(); });

/* ============ Daily review ============ */
function maybeShowReview() {
  if (loadStr(KEYS.lastReview) === todayISO()) return;
  const y = new Date(Date.now() - 86400000);
  const yiso = isoDate(y);
  const ytasks = state.tasks.filter(t => t.bucket!=='delegated' && t.scheduledDate === yiso);
  if (!ytasks.length) return;
  if (state.reviews.some(r => r.date === yiso)) return;
  openReview(yiso);
}
function openReview(date) {
  const list = state.tasks.filter(t => t.bucket!=='delegated' && t.scheduledDate === date).sort((a,b)=>(a.order||0)-(b.order||0));
  const st = progressStats(list);
  function render() {
    const fresh = state.tasks.filter(t => t.bucket!=='delegated' && t.scheduledDate === date).sort((a,b)=>(a.order||0)-(b.order||0));
    const s2 = progressStats(fresh);
    const rows = fresh.map(t => `
      <div class="review-task">
        <span class="review-circle ${t.status==='completed'?'done':''}">${t.status==='completed'?Icon.check:''}</span>
        <span class="review-title ${t.status==='completed'?'done':''}">${escapeHTML(t.title)}</span>
        <span class="hours-tag">${fmt(t.estimatedHours)}h</span>
        ${t.status==='completed'?'':`<button class="btn btn-outline btn-sm" data-rev-done="${t.id}">完了に</button>`}
      </div>`).join('');
    $('#reviewModalInner').innerHTML = `
      <div class="modal-head"><h2>${escapeHTML(formatDateJP(date))} の振り返り</h2>
        <div class="sub">完了 ${s2.doneCount}/${fresh.length}件 ・ ${fmt(s2.doneEst)}h / ${fmt(s2.totalEst)}h</div></div>
      <div class="modal-body">${rows}</div>
      <div class="modal-foot">
        <button class="btn btn-outline btn-sm" id="revSkip">スキップ</button>
        <button class="btn btn-primary btn-sm" id="revDone">完了</button>
      </div>`;
    $$('[data-rev-done]').forEach(b => b.addEventListener('click', () => {
      const t = getTask(b.dataset.revDone); if (!t) return;
      t.status = 'completed'; t.completedAt = new Date().toISOString(); if (!t.actualHours) t.actualHours = t.estimatedHours;
      persistTasks(); render();
    }));
    $('#revSkip').addEventListener('click', () => { saveStr(KEYS.lastReview, todayISO()); closeReview(); });
    $('#revDone').addEventListener('click', () => {
      const f2 = state.tasks.filter(t => t.bucket!=='delegated' && t.scheduledDate === date);
      const c = progressStats(f2);
      state.reviews.push({ id: uid(), date, completedCount: c.doneCount, totalCount: f2.length, createdAt: new Date().toISOString() });
      persistReviews(); saveStr(KEYS.lastReview, todayISO()); closeReview(); renderActiveTab();
    });
  }
  $('#reviewModal').classList.add('open');
  render();
}
function closeReview() { $('#reviewModal').classList.remove('open'); }
$('#reviewModal').addEventListener('click', e => { if (e.target.id === 'reviewModal') closeReview(); });

/* ============ Toast ============ */
let toastTimer;
function showToast(msg) {
  const t = $('#toast');
  t.innerHTML = `${Icon.check}<span>${escapeHTML(msg)}</span>`;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============ Init ============ */
function init() {
  // ?reset wipes local data
  if (new URLSearchParams(location.search).has('reset')) {
    Object.values(KEYS).forEach(k => localStorage.removeItem(k));
    localStorage.removeItem('taskdock_notesHidden');
    location.replace(location.pathname);
    return;
  }
  // sanity coerce
  if (!Array.isArray(state.tasks)) state.tasks = [];
  state.tasks.forEach(t => { if (t.progress === undefined) t.progress = null; if (t.description === undefined) t.description = ''; if (t.bucket === undefined) t.bucket = null; if (t.assignee === undefined) t.assignee = null; if (t.dueDate === undefined) t.dueDate = null; if (t.repeat === undefined) t.repeat = null; if (t.recurSpawned === undefined) t.recurSpawned = false; });

  checkAutoApplyTemplates();
  renderNav();
  renderActiveTab();
  maybeShowReview();
}

try { init(); }
catch (err) {
  console.error(err);
  document.body.innerHTML = `<div style="max-width:420px;margin:80px auto;padding:24px;text-align:center;font-family:-apple-system,sans-serif">
    <h2 style="margin-bottom:12px">エラーが発生しました</h2>
    <p style="color:#787672;margin-bottom:20px;font-size:13px">${escapeHTML(String(err))}</p>
    <button onclick="location.reload()" style="padding:8px 16px;border-radius:7px;border:1px solid #ddd;background:#fff;margin-right:8px">再読み込み</button>
    <button onclick="if(confirm('ローカルデータを削除しますか？')){localStorage.clear();location.reload();}" style="padding:8px 16px;border-radius:7px;border:none;background:#b5544d;color:#fff">データをリセット</button>
  </div>`;
}
</script>
</body>
</html>
